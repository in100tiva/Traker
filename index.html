<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' blob:; worker-src 'self' blob:; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"
    />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Streaks — Tracker de Hábitos</title>
    <style>
      /* Pre-paint shell (before React mounts) — uses local CSS vars prefixed with --shell-*
         so it never collides with the Tailwind token system. */
      :root {
        --shell-bg: #0a0a0a;
        --shell-surface: #141414;
        --shell-border: rgba(255, 255, 255, 0.06);
        --shell-accent: #e8ff3a;
        --shell-text: #f5f5f5;
        --shell-text-mute: rgba(245, 245, 245, 0.38);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--shell-bg);
        color: var(--shell-text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
      }
      .app-shell {
        display: flex;
        height: 100vh;
        width: 100%;
        overflow: hidden;
      }
      .app-shell__sidebar {
        width: 240px;
        border-right: 1px solid var(--shell-border);
        background: var(--shell-surface);
        display: none;
        flex-direction: column;
        padding: 24px 16px;
      }
      @media (min-width: 768px) {
        .app-shell__sidebar {
          display: flex;
        }
      }
      .app-shell__brand {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 4px 16px;
        border-bottom: 1px solid var(--shell-border);
        margin-bottom: 18px;
      }
      .app-shell__logo {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: var(--shell-accent);
      }
      .app-shell__brand-text {
        font-weight: 700;
        font-size: 15px;
        letter-spacing: -0.01em;
      }
      .app-shell__main {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .app-shell__topbar {
        height: 60px;
        border-bottom: 1px solid var(--shell-border);
      }
      .app-shell__content {
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        max-width: 1320px;
        width: 100%;
        margin: 0 auto;
        box-sizing: border-box;
      }
      .app-shell__hero {
        height: 170px;
        border-radius: 18px;
        border: 1px solid var(--shell-border);
        background: var(--shell-surface);
        position: relative;
        overflow: hidden;
      }
      .app-shell__grid {
        display: grid;
        grid-template-columns: 1.2fr 1.4fr;
        gap: 24px;
      }
      @media (max-width: 1023px) {
        .app-shell__grid {
          grid-template-columns: 1fr;
        }
      }
      .app-shell__card,
      .app-shell__hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0,
          rgba(232, 255, 58, 0.04) 50%,
          transparent 100%
        );
        animation: shell-shimmer 1.8s linear infinite;
      }
      .app-shell__card {
        position: relative;
        height: 200px;
        border-radius: 18px;
        border: 1px solid var(--shell-border);
        background: var(--shell-surface);
        overflow: hidden;
      }
      @keyframes shell-shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-shell__card,
        .app-shell__hero::after {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-shell" aria-hidden="true">
        <aside class="app-shell__sidebar">
          <div class="app-shell__brand">
            <div class="app-shell__logo"></div>
            <div class="app-shell__brand-text">Streaks</div>
          </div>
        </aside>
        <main class="app-shell__main">
          <div class="app-shell__topbar"></div>
          <div class="app-shell__content">
            <div class="app-shell__hero"></div>
            <div class="app-shell__grid">
              <div>
                <div class="app-shell__card" style="height: 420px"></div>
              </div>
              <div>
                <div class="app-shell__card" style="height: 600px"></div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
